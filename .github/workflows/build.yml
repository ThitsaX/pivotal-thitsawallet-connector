name: Build, Publish and Security Scan

on:
  release:
    types:
      - published

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-publish-scan:
    name: Build, Publish and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          flavor: |
            latest=${{ github.event_name == 'release' }}

          tags: |
            type=match,pattern=v\d+\.\d+\.\d+,enable=${{ github.event_name == 'release' }}
            type=match,pattern=v(\d+\.\d+\.\d+),group=1,enable=${{ github.event_name == 'release' }}
            type=match,pattern=v(\d+\.\d+)\.\d+,group=1,enable=${{ github.event_name == 'release' }}
            type=sha,value={{sha}},format=long,enable=${{ github.event_name != 'release' }}

          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate GitHub Packages token
        shell: bash
        env:
          GITHUB_ACTOR_NAME: pyaesoneaung-thitsaworks
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_PACKAGES_TOKEN}" ]; then
            echo "::error::GH_PACKAGES_TOKEN repository secret is missing or empty"
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --user "${GITHUB_ACTOR_NAME}:${GH_PACKAGES_TOKEN}" \
            "https://maven.pkg.github.com/thitsax/pivotal-java-connector/com/thitsaworks/mojaloop/coreconnector/mod-pivotal-connector-api/0.0.8/mod-pivotal-connector-api-0.0.8.pom" \
            --output /tmp/common.pom

          echo "GitHub Packages token validation succeeded"

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@v7
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

          build-args: |
            GITHUB_ACTOR=pyaesoneaung-thitsaworks

          secret-envs: |
            github_token=GH_PACKAGES_TOKEN

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::Docker image digest was not produced"
            exit 1
          fi

          echo "Published digest: ${IMAGE_DIGEST}"

      - name: Scan published image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker_build.outputs.digest }}
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: 0

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container-image

      - name: Upload Trivy audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report-${{ github.run_number }}-${{ github.sha }}
          path: trivy-image.sarif
          if-no-files-found: error
          retention-days: 90

      - name: Publish workflow summary
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.docker_build.outputs.digest }}
          IMAGE_TAGS: ${{ steps.docker_meta.outputs.tags }}
        run: |
          {
            echo "## Container Build and Security Scan"
            echo
            echo "**Repository:** \`${GITHUB_REPOSITORY}\`"
            echo
            echo "**Commit:** \`${GITHUB_SHA}\`"
            echo
            echo "**Image digest:** \`${IMAGE_DIGEST}\`"
            echo
            echo "**Published tags:**"
            echo '```text'
            echo "${IMAGE_TAGS}"
            echo '```'
            echo
            echo "Trivy scanned the published image for Medium, High, and Critical vulnerabilities."
          } >> "${GITHUB_STEP_SUMMARY}"